<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams & Players</title>
    <link rel="stylesheet" href="teams.css">
</head>
<body>

<div class="container">
    <h1>Teams</h1>

    <button id="addTeamBtn" class="btn primary">+ Add Team</button>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Team Name</th>
                <th>Points</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="teamsTable"></tbody>
    </table>

    <!-- Team Form -->
    <div id="teamForm" class="form hidden">
        <h3 id="formTitle">Add Team</h3>
        <input type="hidden" id="teamId">
        <input type="text" id="teamName" placeholder="Team Name">
        <input type="number" id="teamPoints" placeholder="Points">

        <button class="btn success" onclick="saveTeam()">Save</button>
        <button class="btn danger" onclick="closeTeamForm()">Cancel</button>
    </div>

    <!-- Players Section -->
    <div id="playersSection" class="hidden">
        <h2>Players</h2>

        <button class="btn primary" onclick="showPlayerForm()">+ Add Player</button>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Score</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="playersTable"></tbody>
        </table>
    </div>

    <!-- Player Form -->
    <div id="playerForm" class="form hidden">
        <h3>Player</h3>
        <input type="hidden" id="playerId">
        <input type="text" id="playerName" placeholder="Player Name">
        <input type="number" id="playerScore" placeholder="Score">

        <button class="btn success" onclick="savePlayer()">Save</button>
        <button class="btn danger" onclick="closePlayerForm()">Cancel</button>
    </div>

    <a href="home.html" class="back">← Back to Dashboard</a>
</div>

<script src="teams.js"></script>
</body>
</html>
