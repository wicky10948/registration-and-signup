<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="dashboard-container">
    <h2>Dashboard</h2>

    <table class="dashboard-table">
        <thead>
            <tr>
                
               
                <th>Leaderboard</th>
                 <th>Activities</th>
                <th>Announcements</th>
                <th>Stats</th>
            </tr>
        </thead>

        <tbody>
            <tr>
      
                <!-- Leaderboard -->
                <td>
                    <ul id="leaderboard"></ul>
                </td>
                  
                <!-- Activities -->
                <td>
                    <ul id="activities"></ul>
                </td>


                <!-- Announcements -->
                <td>
                    <div id="announcements"></div>
                </td>

                  <!-- Stats -->
                <td>
                    <div id="stats"></div>
                </td>
            </tr>
        </tbody>
    </table>

    <button onclick="logout()">Logout</button>
</div>

<script src="dashboard.js"></script>

</body>
</html>
