<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="register.css">

</head>
<body>
<h1>REGISTRATION</h1>
<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="signup-container">


<form id="register" class="register-form">

<input type="text" class="form-control mb-3" id="username" placeholder="User Id" required>

<input type="email" class="form-control mb-3" id="email" placeholder="Email Id" required>

<input type="password" class="form-control mb-3" id="password" placeholder="Enter Password" required>

<button type="submit" class="btn btn-primary w-100 register-submit-button">
Register
</button>

</form>
</div>

</div>
<p class="mt-3 text-center">
Already have an account?
<a href="login.html">Login here</a>
</p>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="register.js"></script>
</body>
</html>
